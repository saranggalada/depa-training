services:
  train:
    image: depa-llm-finetune-cpu:latest
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=""
    volumes:
      - $MARKET_DATA_INPUT_PATH:/mnt/remote/market_data_provider
      - $FINTECH_INPUT_PATH:/mnt/remote/fintech_provider
      - $BANK_INPUT_PATH:/mnt/remote/bank_provider
      - $MODEL_INPUT_PATH:/mnt/remote/model
      - $MODEL_OUTPUT_PATH:/mnt/remote/output
      - $CONFIGURATION_PATH:/mnt/remote/config
    command: ["/bin/bash", "run.sh"]
